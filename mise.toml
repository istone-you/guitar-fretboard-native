[tools]
"aqua:openai/codex" = "0.116.0"
"npm:@anthropic-ai/claude-code" = "2.1.81"
"npm:@google/gemini-cli" = "0.34.0"
"bun" = "1.3.10"
"hk" = "1.40.0"
"npm:eas-cli" = "18.4.0"

[env]
HK_MISE = "1"
HK_PKL_BACKEND = "pklr"

[hooks]
postinstall = "hk install --mise"

[settings]
experimental = true
lockfile = true

[settings.npm]
bun = true
